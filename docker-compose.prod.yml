version: "3.3"

services:
    nginx:
        build:
            context: ./docker/nginx
            args:
                DOMAIN_NAME: ${DOMAIN_NAME}
        ports:
            - "${NGINX_PORT}:80"
        volumes:
            - ./:/var/www/symfony
        environment:
            DOMAIN_NAME: ${DOMAIN_NAME}
        depends_on:
            - php
        networks:
            - site_monitoring_net

    php:
        build:
            context: ./docker/php
            args:
                TIMEZONE: ${TIMEZONE}
                UID: ${UID}
                GID: ${GID}
        environment:
            APP_ENV: prod
            APP_SECRET: ${APP_SECRET}
            DATABASE_URL: ${DATABASE_URL}
            MESSENGER_TRANSPORT_DSN: ${MESSENGER_TRANSPORT_DSN}
            TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
            TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
        volumes:
            - ./:/var/www/symfony
        depends_on:
            - postgres
            - rabbitmq
        networks:
            - site_monitoring_net

    worker:
        build:
            context: ./docker/php
            args:
                TIMEZONE: ${TIMEZONE}
                UID: ${UID}
                GID: ${GID}
        command: >
            sh -c 'until php -r "exit(@fsockopen(\"rabbitmq\", 5672) ? 0 : 1);"; do echo "Waiting for RabbitMQ..."; sleep 2; done; exec php bin/console messenger:consume async -vv'
        restart: unless-stopped
        environment:
            APP_ENV: prod
            APP_SECRET: ${APP_SECRET}
            DATABASE_URL: ${DATABASE_URL}
            MESSENGER_TRANSPORT_DSN: ${MESSENGER_TRANSPORT_DSN}
            TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
            TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
        volumes:
            - ./:/var/www/symfony
        depends_on:
            - postgres
            - rabbitmq
        networks:
            - site_monitoring_net

    scheduler:
        build:
            context: ./docker/php
            args:
                TIMEZONE: ${TIMEZONE}
                UID: ${UID}
                GID: ${GID}
        command: >
            sh -c 'until php -r "exit(@fsockopen(\"rabbitmq\", 5672) ? 0 : 1);"; do echo "Waiting for RabbitMQ..."; sleep 2; done; printenv > /etc/environment && cp /var/www/symfony/docker/cron/site-monitoring /etc/cron.d/site-monitoring && chmod 0644 /etc/cron.d/site-monitoring && cron -f'
        restart: unless-stopped
        environment:
            APP_ENV: prod
            APP_SECRET: ${APP_SECRET}
            DATABASE_URL: ${DATABASE_URL}
            MESSENGER_TRANSPORT_DSN: ${MESSENGER_TRANSPORT_DSN}
            TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
            TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
        volumes:
            - ./:/var/www/symfony
        depends_on:
            - postgres
            - rabbitmq
        networks:
            - site_monitoring_net

    postgres:
        image: postgres:${POSTGRES_VERSION}-alpine
        ports:
            - "${POSTGRES_PORT}:5432"
        environment:
            POSTGRES_USER: ${POSTGRES_USER}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
            POSTGRES_DB: ${POSTGRES_DB}
        volumes:
            - postgres_data:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
            interval: 10s
            timeout: 5s
            retries: 12
        networks:
            - site_monitoring_net

    rabbitmq:
        image: rabbitmq:3.10.7-management
        environment:
            RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS}
        ports:
            - "${RABBITMQ_MANAGEMENT_PORT}:15672"
        healthcheck:
            test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
            interval: 10s
            timeout: 5s
            retries: 12
            start_period: 20s
        networks:
            - site_monitoring_net

volumes:
    postgres_data:

networks:
    site_monitoring_net:
