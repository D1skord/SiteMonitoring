version: "3.8"

services:
    nginx:
        build:
            context: ./docker/nginx
            args:
                DOMAIN_NAME: ${DOMAIN_NAME}
        ports:
            - "${NGINX_PORT}:80"
        volumes:
            - ./:/var/www/symfony
        environment:
            DOMAIN_NAME: ${DOMAIN_NAME}
        depends_on:
            - php
        networks:
            - site_monitoring_net

    php:
        build:
            context: ./docker/php
            args:
                TIMEZONE: ${TIMEZONE}
                UID: ${UID}
                GID: ${GID}
        environment:
            APP_ENV: prod
            APP_SECRET: ${APP_SECRET}
            DATABASE_URL: ${DATABASE_URL}
            MESSENGER_TRANSPORT_DSN: ${MESSENGER_TRANSPORT_DSN}
            TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
            TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
        volumes:
            - ./:/var/www/symfony
        depends_on:
            - postgres
            - rabbitmq
        networks:
            - site_monitoring_net

    worker:
        build:
            context: ./docker/php
            args:
                TIMEZONE: ${TIMEZONE}
                UID: ${UID}
                GID: ${GID}
        command: php bin/console messenger:consume async -vv
        restart: unless-stopped
        environment:
            APP_ENV: prod
            APP_SECRET: ${APP_SECRET}
            DATABASE_URL: ${DATABASE_URL}
            MESSENGER_TRANSPORT_DSN: ${MESSENGER_TRANSPORT_DSN}
            TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
            TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
        volumes:
            - ./:/var/www/symfony
        depends_on:
            - postgres
            - rabbitmq
        networks:
            - site_monitoring_net

    postgres:
        image: postgres:${POSTGRES_VERSION}-alpine
        ports:
            - "${POSTGRES_PORT}:5432"
        environment:
            POSTGRES_USER: ${POSTGRES_USER}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
            POSTGRES_DB: ${POSTGRES_DB}
        volumes:
            - postgres_data:/var/lib/postgresql/data
        networks:
            - site_monitoring_net

    rabbitmq:
        image: rabbitmq:3.10.7-management
        environment:
            RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS}
        ports:
            - "${RABBITMQ_MANAGEMENT_PORT}:15672"
        networks:
            - site_monitoring_net

    graylog_mongo:
        image: mongo:5.0.13
        volumes:
            - graylog_mongo_data:/data/db
        networks:
            - site_monitoring_net

    graylog_elasticsearch:
        image: elasticsearch:7.17.10
        environment:
            discovery.type: single-node
            cluster.name: docker-cluster
            bootstrap.memory_lock: "true"
            ES_JAVA_OPTS: "-Xms512m -Xmx512m"
        ulimits:
            memlock:
                soft: -1
                hard: -1
        volumes:
            - graylog_elasticsearch_data:/usr/share/elasticsearch/data
        ports:
            - "${GRAYLOG_ELASTICSEARCH_PORT}:9200"
        networks:
            - site_monitoring_net

    graylog:
        image: graylog/graylog:5.0
        environment:
            GRAYLOG_PASSWORD_SECRET: ${GRAYLOG_PASSWORD_SECRET}
            GRAYLOG_ROOT_PASSWORD_SHA2: ${GRAYLOG_ROOT_PASSWORD_SHA2}
            GRAYLOG_HTTP_EXTERNAL_URI: http://127.0.0.1:${GRAYLOG_PORT}/
        volumes:
            - graylog_data:/usr/share/graylog/data/data
        ports:
            - "${GRAYLOG_PORT}:9000"
            - "${GRAYLOG_GELF_PORT}:12201/udp"
        depends_on:
            - graylog_mongo
            - graylog_elasticsearch
        networks:
            - site_monitoring_net

volumes:
    postgres_data:
    graylog_data:
    graylog_mongo_data:
    graylog_elasticsearch_data:

networks:
    site_monitoring_net:
