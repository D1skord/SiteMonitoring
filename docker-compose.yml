services:
    nginx:
        build:
            context: ./docker/nginx
            args:
                DOMAIN_NAME: ${DOMAIN_NAME:-site-monitoring.local}
        ports:
            - "${NGINX_PORT:-80}:80"
        volumes:
            - ./:/var/www/symfony
        environment:
            DOMAIN_NAME: ${DOMAIN_NAME:-site-monitoring.local}
        depends_on:
            - php
        networks:
            - site_monitoring_net

    php:
        build:
            context: ./docker/php
            args:
                TIMEZONE: ${TIMEZONE:-Europe/Moscow}
                UID: ${UID:-1000}
                GID: ${GID:-1000}
        environment:
            APP_ENV: ${APP_ENV:-dev}
            APP_SECRET: ${APP_SECRET:-change-me}
            DATABASE_URL: ${DATABASE_URL}
            MESSENGER_TRANSPORT_DSN: ${MESSENGER_TRANSPORT_DSN}
        volumes:
            - ./:/var/www/symfony
        depends_on:
            - postgres
            - rabbitmq
        networks:
            - site_monitoring_net

    postgres:
        image: postgres:${POSTGRES_VERSION:-13}-alpine
        ports:
            - "${POSTGRES_PORT:-5433}:5432"
        environment:
            POSTGRES_USER: ${POSTGRES_USER:-app}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
            POSTGRES_DB: ${POSTGRES_DB:-site_monitoring}
        volumes:
            - postgres_data:/var/lib/postgresql/data
        networks:
            - site_monitoring_net

    rabbitmq:
        image: rabbitmq:3.10.7-management
        ports:
            - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
        networks:
            - site_monitoring_net

volumes:
    postgres_data:

networks:
    site_monitoring_net:
